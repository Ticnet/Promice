spec_version: 1
name: CICDRepairEnv
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  A Reinforcement Learning environment for CI/CD pipeline repair.
  Agents must diagnose and repair broken pipelines by selecting a sequence of actions.
  Includes three difficulty tiers (easy/medium/hard).

tags:
  - openenv
  - cicd
  - reinforcement-learning

tasks:
  - name: tier_1
    difficulty: easy
    description: "Single-step dependency resolution"
  - name: tier_2
    difficulty: medium
    description: "Multi-step state manipulation"
  - name: tier_3
    difficulty: hard
    description: "Memory-augmented multi-step patching"

action:
  type: object
  fields:
    action_id:
      type: integer
      range: [0, 7]
      required: true

observation:
  type: object
  fields:
    pipeline_stage:   {type: string}
    failure_log:      {type: string}
    error_type:       {type: string}
    available_actions: {type: array, items: integer}
    memory_hints:     {type: array, items: string}
    step_count:       {type: integer}
    pipeline_healthy:  {type: boolean}
    progress_pct:      {type: number, range: [0, 1]}
    task_score:       {type: number, nullable: true, range: [0, 1]}

reward:
  range: [0.0, 1.0]
